services:
  - type: web
    name: neuralvault-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_AUTH_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false